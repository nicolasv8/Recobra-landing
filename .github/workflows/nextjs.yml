name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://recobratutiempo.com
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SECRET_KEY: sb_secret_placeholder
          WOMPI_PUBLIC_KEY: pub_test_placeholder
          WOMPI_INTEGRITY_SECRET: integrity-placeholder
          WOMPI_EVENTS_SECRET: events-placeholder
          WOMPI_CURRENCY: COP
          WOMPI_NORMAL_AMOUNT_IN_CENTS: "89900"
          WOMPI_REFERRAL_AMOUNT_IN_CENTS: "79900"
